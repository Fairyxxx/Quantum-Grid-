<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Forge — 二维码生成器</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <canvas id="particleCanvas"></canvas>

  <div class="app-container">
    <!-- 左侧说明面板 -->
    <aside class="info-panel">
      <div class="panel-header">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect x="2" y="2" width="10" height="10" rx="2" stroke="url(#logoGrad)" stroke-width="1.8" fill="none"/>
            <rect x="16" y="2" width="10" height="10" rx="2" stroke="url(#logoGrad)" stroke-width="1.8" fill="none"/>
            <rect x="2" y="16" width="10" height="10" rx="2" stroke="url(#logoGrad)" stroke-width="1.8" fill="none"/>
            <rect x="16" y="16" width="10" height="10" rx="2" fill="url(#logoGrad)"/>
            <defs>
              <linearGradient id="logoGrad" x1="0" y1="0" x2="28" y2="28">
                <stop stop-color="#00f5ff"/>
                <stop offset="1" stop-color="#a855f7"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1>QR <span class="accent">Forge</span></h1>
      </div>

      <div class="badges">
        <span class="badge">v2.0</span>
        <span class="badge badge-outline">纯前端</span>
        <span class="badge badge-outline">实时生成</span>
      </div>

      <div class="feature-list">
        <div class="feature-item">
          <span class="feature-icon">◆</span>
          <span>输入文本或 URL 即时生成二维码</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">◆</span>
          <span>Canvas 实时渲染，零延迟反馈</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">◆</span>
          <span>一键下载 PNG 高清图片</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">◆</span>
          <span>一键复制到剪贴板</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">◆</span>
          <span>支持 L/M/Q/H 四级纠错</span>
        </div>
      </div>

      <div class="api-section">
        <h3>使用方式</h3>
        <div class="code-block">
          <code>1. 输入文本或链接</code>
          <code>2. 二维码实时生成</code>
          <code>3. 点击下载 / 复制</code>
        </div>
      </div>

      <div class="stats-section">
        <div class="stat">
          <span class="stat-value" id="charCount">0</span>
          <span class="stat-label">已输入字符</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="ecLevel">L</span>
          <span class="stat-label">纠错级别</span>
        </div>
      </div>

      <footer class="panel-footer">
        <p>QR Forge &copy; 2026</p>
        <p class="credit">Powered by qrcodejs</p>
      </footer>
    </aside>

    <!-- 右侧生成器面板 -->
    <main class="generator-panel">
      <div class="qr-stage">
        <div class="qr-wrapper" id="qrWrapper">
          <div id="qrcode"></div>
          <div class="qr-placeholder" id="qrPlaceholder">
            <svg width="64" height="64" viewBox="0 0 64 64" fill="none" opacity="0.3">
              <rect x="4" y="4" width="24" height="24" rx="4" stroke="currentColor" stroke-width="2"/>
              <rect x="36" y="4" width="24" height="24" rx="4" stroke="currentColor" stroke-width="2"/>
              <rect x="4" y="36" width="24" height="24" rx="4" stroke="currentColor" stroke-width="2"/>
              <rect x="36" y="36" width="24" height="24" rx="4" fill="currentColor" opacity="0.5"/>
            </svg>
            <p>输入内容以生成二维码</p>
          </div>
        </div>
        <div class="qr-glow"></div>
      </div>

      <div class="input-section">
        <div class="input-wrapper">
          <input
            type="text"
            id="textInput"
            placeholder="输入文本、URL 或任何内容..."
            autocomplete="off"
            autofocus
          />
          <button class="clear-btn" id="clearBtn" aria-label="清空">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M4 4L12 12M12 4L4 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>

        <div class="ec-row">
          <label class="ec-label" for="ecSelect">纠错级别</label>
          <select class="ec-select" id="ecSelect">
            <option value="L">L — 低 (7%)</option>
            <option value="M">M — 中 (15%)</option>
            <option value="Q">Q — 较高 (25%)</option>
            <option value="H">H — 高 (30%)</option>
          </select>
        </div>

        <div class="action-row">
          <button class="action-btn download-btn" id="downloadBtn" disabled>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M8 2V10M8 10L5 7M8 10L11 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M2 12V13.5H14V12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            下载 PNG
          </button>
          <button class="action-btn copy-btn" id="copyBtn" disabled>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="5" y="5" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
              <path d="M3 11V3.5C3 2.67 3.67 2 4.5 2H11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            复制图片
          </button>
        </div>
      </div>

      <div class="toast" id="toast"></div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
